<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vital Lens AI Backend</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2ee;
        color: #1f2523;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid #dce3df;
        border-radius: 8px;
        background: #fff;
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
      }
      code {
        border-radius: 6px;
        background: #f5f7f4;
        padding: 2px 6px;
      }
      a {
        color: #315f7f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vital Lens AI Backend</h1>
      <p>This Vercel deployment hosts the AI API for the Vital Lens iPhone app.</p>
      <p>Health check: <a href="/api/health"><code>/api/health</code></a></p>
    </main>
  </body>
</html>
